name: korean-persona tests

on:
  push:
    branches: [main]
    paths:
      - "skills/korean-persona-search/**"
      - "skills/korean-voice-adapter/**"
      - "skills/korean-persona-harness/**"
      - "tests/**"
      - ".github/workflows/korean-persona-tests.yml"
  pull_request:
    paths:
      - "skills/korean-persona-search/**"
      - "skills/korean-voice-adapter/**"
      - "skills/korean-persona-harness/**"
      - "tests/**"
      - ".github/workflows/korean-persona-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Lint shell script
        run: bash -n scripts/install-korean-persona.sh

      - name: Compile Python sources
        run: |
          python -m py_compile \
            skills/korean-persona-search/scripts/search.py \
            skills/korean-persona-search/scripts/download.py

      - name: Run pytest
        run: pytest -v tests/

      - name: Validate marketplace.json
        run: python -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
